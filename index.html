<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Cassa</title>
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    
    <style>
        /* Stili Generali e Sfondo Monocromatico */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0; 
            padding: 20px; 
            background-color: #e8ecf1; /* Sfondo monocromatico elegante */
            display: flex; 
            justify-content: center;
            align-items: flex-start; 
            padding-top: 8vh; 
            min-height: 100vh; 
            box-sizing: border-box;
            color: #333;
        }

        /* Pulsante Login in alto a destra */
        #btnLogin {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            font-size: 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #btnLogin:hover { background: #1a252f; }

        /* Contenitore per le schermate centrali (Input e Login) */
        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 400px; 
            box-sizing: border-box;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        h1 { 
            font-size: 26px; 
            margin-top: 0; 
            margin-bottom: 25px;
            color: #2c3e50; 
            font-weight: 700;
        }

        /* Input Form */
        input[type="text"], input[type="password"] { 
            padding: 16px; 
            width: 100%; 
            margin-bottom: 15px; 
            border: 2px solid #e1e8ed; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }
        input:focus { outline: none; border-color: #4a90e2; background-color: #fff; }

        /* Pulsanti */
        button { 
            padding: 16px; 
            width: 100%; 
            cursor: pointer; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: 700; 
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(1px); }

        .btn-blue { background: linear-gradient(135deg, #4a90e2 0%, #0072ff 100%); box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3); }
        .btn-green { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3); }
        .btn-gray { background: #95a5a6; box-shadow: 0 4px 15px rgba(149, 165, 166, 0.3); margin-top: 15px; }
        .btn-gray:hover { background: #7f8c8d; }

        /* Messaggi */
        #messaggio, #loginMsg { margin-top: 15px; font-weight: 600; min-height: 20px; font-size: 16px; }
        .errore { color: #e74c3c; }
        .successo { color: #2ecc71; }
        
        /* =========================================================
           LAYOUT DASHBOARD RISERVATA (GRIGLIA)
           ========================================================= */
        #dashboardSection {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.5s ease;
        }

        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .dashboard-header h1 { margin: 0; }
        
        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr; /* 1 parte a sinistra, 1.5 a destra */
            gap: 30px;
            align-items: start;
        }

        /* Responsive: su cellulare impila tutto in una colonna */
        @media (max-width: 800px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .dashboard-header { justify-content: center; text-align: center; }
        }

        /* Colonna Sinistra: Tabella e Statistiche */
        .col-sinistra {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        /* Tabella */
        .table-container { border-radius: 10px; overflow: hidden; border: 1px solid #eef2f5; }
        table { width: 100%; border-collapse: collapse; background: #fff; text-align: left; }
        th { background-color: #f8f9fa; color: #2c3e50; padding: 15px; font-weight: 700; border-bottom: 2px solid #eef2f5; }
        td { padding: 15px; border-bottom: 1px solid #eef2f5; color: #495057; }
        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: #fdfdfd; }

        /* Totali */
        .stats-box { margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; text-align: left; border: 1px solid #eef2f5; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; }
        .stat-row strong { color: #2c3e50; font-size: 18px; }
        .highlight-total { color: #4a90e2 !important; font-size: 24px !important; }

        /* Colonna Destra: Grafico */
        .col-destra {
            background: transparent; /* Nessun label bianco visibile dietro */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Ingrandito il grafico */
        #piechart_3d {
            width: 100%;
            height: 450px; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <button id="btnLogin" onclick="mostraLogin()">🔒 Accesso Admin</button>

    <div id="appSection" class="container">
        <h1>💸 Cassa di Gruppo</h1>
        <p style="color: #7f8c8d; margin-bottom: 25px;">Inserisci il tuo nome e l'importo versato.</p>
        
        <input type="text" id="nomeInput" placeholder="Nome (es. Marco)">
        <input type="text" id="soldiInput" placeholder="Importo (es. 10,50)">
        <button class="btn-green" onclick="salvaInDB()">Aggiungi alla Cassa</button>
        
        <div id="messaggio"></div>
    </div>

    <div id="loginSection" class="container" style="display: none;">
        <h1>🔒 Area Riservata</h1>
        <p style="color: #7f8c8d; margin-bottom: 25px;">Inserisci le credenziali per vedere i dati.</p>
        
        <input type="text" id="userInput" placeholder="Nome Utente">
        <input type="password" id="passInput" placeholder="Password">
        <button class="btn-blue" onclick="eseguiLogin()">Accedi ai Dati</button>
        <div id="loginMsg"></div>
        
        <button class="btn-gray" onclick="tornaAllaCassa()">Annulla</button>
    </div>

    <div id="dashboardSection" style="display: none;">
        <div class="dashboard-header">
            <h1>📊 Dashboard Finanziaria</h1>
            <button class="btn-gray" style="width: auto; padding: 10px 20px; margin: 0;" onclick="tornaAllaCassa()">⬅ Esci dall'Area</button>
        </div>

        <div class="dashboard-grid">
            
            <div class="col-sinistra">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Importo Versato</th>
                            </tr>
                        </thead>
                        <tbody id="tabellaCorpo">
                            </tbody>
                    </table>
                </div>

                <div class="stats-box">
                    <div class="stat-row">
                        <span>Media a persona:</span>
                        <strong id="valMedia">0.00 €</strong>
                    </div>
                    <div class="stat-row" style="margin-top: 5px; border-top: 1px solid #e1e8ed; padding-top: 15px;">
                        <span><strong>TOTALE CASSA:</strong></span>
                        <strong class="highlight-total" id="valTotale">0.00 €</strong>
                    </div>
                </div>
            </div>

            <div class="col-destra">
                <h3 style="color: #2c3e50; margin-bottom: 0;">Distribuzione Versamenti</h3>
                <div id="piechart_3d"></div>
            </div>

        </div>
    </div>

    <script>
        // Carica la libreria di Google Charts in background
        google.charts.load("current", {packages:["corechart"]});

        // ==========================================
        // 🛠️ MODIFICA QUI LE TUE CREDENZIALI
        // ==========================================
        const UTENTE_CORRETTO = "Cristian.R";
        const PASSWORD_CORRETTA = "CCF26!";
        // ==========================================

        // --- NAVIGAZIONE SCHERMATE ---
        function mostraLogin() {
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'none';
            document.getElementById('btnLogin').style.display = 'none';
            
            document.getElementById('loginSection').style.display = 'block';
            
            document.getElementById('userInput').value = '';
            document.getElementById('passInput').value = '';
            document.getElementById('loginMsg').innerText = '';
        }

        function tornaAllaCassa() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'none';
            
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'block';
            
            document.getElementById('messaggio').innerText = ''; // Pulisce messaggi vecchi
        }

        function eseguiLogin() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const msg = document.getElementById('loginMsg');

            if (user === UTENTE_CORRETTO && pass === PASSWORD_CORRETTA) {
                // Nasconde il login e mostra la dashboard
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                
                // Carica e disegna i dati!
                caricaDatiDashboard();
            } else {
                msg.innerText = "Credenziali errate. Riprova.";
                msg.className = "errore";
            }
        }

        // --- SALVATAGGIO DATI (AREA PUBBLICA) ---
        function salvaInDB() {
            let nomeGrezzo = document.getElementById('nomeInput').value.trim();
            const soldiRaw = document.getElementById('soldiInput').value.trim();
            const messaggioDiv = document.getElementById('messaggio');

            messaggioDiv.innerText = "";
            messaggioDiv.className = "";

            if (!nomeGrezzo) return mostraMessaggio("Errore: Inserisci un nome.", true);
            if (!isNaN(nomeGrezzo)) return mostraMessaggio("Errore: Il nome non può essere un numero.", true);
            if (!soldiRaw) return mostraMessaggio("Errore: Inserisci un importo.", true);

            let nome = nomeGrezzo.charAt(0).toUpperCase() + nomeGrezzo.slice(1).toLowerCase();
            let soldiNormalizzati = soldiRaw.replace(',', '.');
            
            if (isNaN(soldiNormalizzati) || soldiNormalizzati === "") {
                return mostraMessaggio("Errore: Importo non valido.", true);
            }

            let soldiFormattati = Number(soldiNormalizzati).toFixed(2);
            const testoDaSalvare = nome + ":" + soldiFormattati;

            fetch('/scrivi', {
                method: 'POST',
                body: testoDaSalvare
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('nomeInput').value = '';
                document.getElementById('soldiInput').value = '';
                // Mostra solo il messaggio di successo, nessuna tabella qui!
                mostraMessaggio("Versamento registrato con successo! ✅", false);
            })
            .catch(error => {
                mostraMessaggio("Errore di comunicazione col server.", true);
            });
        }

        // --- ELABORAZIONE DATI (AREA RISERVATA) ---
        function caricaDatiDashboard() {
            fetch('/leggi')
            .then(response => response.text())
            .then(data => {
                const righe = data.trim().split('\n');
                
                // Variabili per la Tabella
                let totale = 0;
                let persone = 0;
                let righeTabellaHtml = "";
                
                // Variabili per il Grafico
                let datiPerGrafico = [['Nome', 'Contributo']]; 
                let ciSonoDati = false;

                if (data.trim()) {
                    righe.forEach(riga => {
                        if(riga.includes(':')) {
                            const parti = riga.split(':');
                            const nome = parti[0];
                            const importo = parseFloat(parti[1]);
                            
                            if(!isNaN(importo)) {
                                // Aggiorna dati Tabella
                                totale += importo;
                                persone++;
                                righeTabellaHtml += `<tr><td><strong>${nome}</strong></td><td>${importo.toFixed(2)} €</td></tr>`;
                                
                                // Aggiorna dati Grafico
                                datiPerGrafico.push([nome, importo]);
                                ciSonoDati = true;
                            }
                        }
                    });
                }

                // 1. COMPILA LA TABELLA
                if (persone === 0) {
                    righeTabellaHtml = "<tr><td colspan='2' style='text-align: center; color: #95a5a6;'>Nessun dato presente</td></tr>";
                }
                const media = persone > 0 ? (totale / persone) : 0;
                document.getElementById('tabellaCorpo').innerHTML = righeTabellaHtml;
                document.getElementById('valTotale').innerText = totale.toFixed(2) + " €";
                document.getElementById('valMedia').innerText = media.toFixed(2) + " €";

                // 2. DISEGNA IL GRAFICO INGRANDITO
                if (ciSonoDati) {
                    var dataTable = google.visualization.arrayToDataTable(datiPerGrafico);
                    var options = {
                        is3D: true,
                        backgroundColor: 'transparent', // Sfondo monocromatico/trasparente
                        legend: { position: 'right', textStyle: { color: '#333', fontSize: 14 } },
                        chartArea: { width: '100%', height: '85%' }, // Occupa molto più spazio
                        pieSliceText: 'value' // Mostra il valore sulla fetta invece della percentuale
                    };

                    var chart = new google.visualization.PieChart(document.getElementById('piechart_3d'));
                    chart.draw(dataTable, options);
                } else {
                    document.getElementById('piechart_3d').innerHTML = "<p style='padding-top: 150px; color: #95a5a6;'>Nessun versamento registrato per il grafico.</p>";
                }
            })
            .catch(error => console.error('Errore lettura db per dashboard:', error));
        }

        // --- UTILITY MESSAGGI ---
        function mostraMessaggio(testo, isErrore) {
            const div = document.getElementById('messaggio');
            div.innerText = testo;
            div.className = isErrore ? "errore" : "successo";
        }
    </script>
</body>
</html>
