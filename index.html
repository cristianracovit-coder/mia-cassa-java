<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestione Cassa</title>
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    
    <style>
        /* Stili Generali */
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex; 
            justify-content: center;
            align-items: flex-start; 
            padding-top: 8vh; 
            min-height: 100vh; 
            box-sizing: border-box;
            color: #333;
        }

        /* Pulsante Login in alto a destra */
        #btnLogin {
            position: absolute;
            top: 20px;
            right: 20px;
            width: auto;
            padding: 10px 20px;
            background: #2c3e50;
            font-size: 14px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        #btnLogin:hover { background: #1a252f; }

        .container { 
            background: white; 
            padding: 35px 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px; 
            box-sizing: border-box;
            animation: fadeIn 0.5s ease;
        }

        h1 { 
            font-size: 26px; 
            margin-top: 0; 
            margin-bottom: 25px;
            color: #2c3e50; 
            font-weight: 700;
        }

        /* Input Form */
        input[type="text"], input[type="password"] { 
            padding: 16px; 
            width: 100%; 
            margin-bottom: 15px; 
            border: 2px solid #e1e8ed; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 16px; 
            background-color: #f8f9fa;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #4a90e2;
            background-color: #fff;
        }

        /* Pulsanti */
        button { 
            padding: 16px; 
            width: 100%; 
            cursor: pointer; 
            background: linear-gradient(135deg, #4a90e2 0%, #0072ff 100%);
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: 700; 
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }
        
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(74, 144, 226, 0.4); }
        button:active { transform: translateY(1px); }

        .btn-green {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.3);
        }
        .btn-green:hover { box-shadow: 0 6px 20px rgba(56, 239, 125, 0.4); }

        .btn-gray {
            background: #95a5a6;
            box-shadow: 0 4px 15px rgba(149, 165, 166, 0.3);
            margin-top: 15px;
        }
        .btn-gray:hover { box-shadow: 0 6px 20px rgba(149, 165, 166, 0.4); background: #7f8c8d;}

        /* Messaggi */
        #messaggio, #loginMsg { margin-top: 5px; font-weight: 600; min-height: 20px; font-size: 15px; margin-bottom: 15px;}
        .errore { color: #e74c3c; }
        .successo { color: #2ecc71; }
        
        /* Tabella */
        .table-container {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #eef2f5;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            text-align: left;
        }

        th {
            background-color: #f8f9fa;
            color: #2c3e50;
            padding: 12px 15px;
            font-weight: 700;
            border-bottom: 2px solid #eef2f5;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #eef2f5;
            color: #495057;
        }

        tr:last-child td { border-bottom: none; }
        tr:nth-child(even) { background-color: #fdfdfd; }

        /* Riquadro Totali */
        .stats-box {
            margin-top: 20px;
            padding: 15px 20px;
            background: #f8f9fa;
            border-radius: 10px;
            text-align: left;
            border: 1px solid #eef2f5;
        }

        .stat-row {
            display: flex; justify-content: space-between; padding: 5px 0;
        }
        .stat-row strong { color: #2c3e50; font-size: 18px; }
        .highlight-total { color: #4a90e2 !important; font-size: 22px !important; }

        /* Sezione Segreta */
        .area-segreta {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #eef2f5;
            border-radius: 10px;
            background: #fff;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <button id="btnLogin" onclick="mostraAreaLogin()">🔒 Login</button>

    <div id="appSection" class="container">
        <h1>💸 Gestione Cassa</h1>
        
        <input type="text" id="nomeInput" placeholder="Nome (es. Marco)">
        <input type="text" id="soldiInput" placeholder="Importo (es. 10,50)">
        <button class="btn-green" onclick="salvaInDB()">Aggiungi alla Cassa</button>
        <div id="messaggio"></div>

        <div id="datiCassa">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Importo</th>
                        </tr>
                    </thead>
                    <tbody id="tabellaCorpo">
                        </tbody>
                </table>
            </div>

            <div class="stats-box">
                <div class="stat-row">
                    <span>Media a persona:</span>
                    <strong id="valMedia">0.00 €</strong>
                </div>
                <div class="stat-row" style="margin-top: 5px;">
                    <span><strong>Totale cassa:</strong></span>
                    <strong class="highlight-total" id="valTotale">0.00 €</strong>
                </div>
            </div>
        </div>
    </div>

    <div id="loginSection" class="container" style="display: none;">
        <h1>🔒 Area Riservata</h1>
        
        <div id="formLogin">
            <input type="text" id="userInput" placeholder="Nome Utente">
            <input type="password" id="passInput" placeholder="Password">
            <button onclick="eseguiLogin()">Accedi</button>
            <div id="loginMsg"></div>
        </div>

        <div id="contenutoRiservato" style="display: none;">
            <h3 style="color: #2ecc71; margin-top: 0;">Accesso Effettuato! ✅</h3>
            
            <div class="area-segreta">
                <h4 style="margin: 10px 0; color: #2c3e50;">Percentuali di Versamento</h4>
                <div id="piechart_3d" style="width: 100%; height: 250px;"></div>
            </div>
        </div>

        <button class="btn-gray" onclick="tornaAllaCassa()">Torna alla Cassa</button>
    </div>

    <script>
        // Carica la libreria di Google Charts in background
        google.charts.load("current", {packages:["corechart"]});

        // Carica la tabella all'avvio
        window.onload = calcolaStatistiche;

        // ==========================================
        // 🛠️ MODIFICA QUI LE TUE CREDENZIALI
        // ==========================================
        const UTENTE_CORRETTO = "Cristian.R";
        const PASSWORD_CORRETTA = "CCF26!";
        // ==========================================

        // --- FUNZIONI DI NAVIGAZIONE E LOGIN ---
        function mostraAreaLogin() {
            document.getElementById('appSection').style.display = 'none';
            document.getElementById('btnLogin').style.display = 'none';
            document.getElementById('loginSection').style.display = 'block';
            
            document.getElementById('userInput').value = '';
            document.getElementById('passInput').value = '';
            document.getElementById('loginMsg').innerText = '';
        }

        function tornaAllaCassa() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('appSection').style.display = 'block';
            document.getElementById('btnLogin').style.display = 'block';
            
            document.getElementById('formLogin').style.display = 'block';
            document.getElementById('contenutoRiservato').style.display = 'none';
        }

        function eseguiLogin() {
            const user = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            const msg = document.getElementById('loginMsg');

            if (user === UTENTE_CORRETTO && pass === PASSWORD_CORRETTA) {
                // Mostra i div NASCOSTI prima di disegnare il grafico (se no si schiaccia)
                document.getElementById('formLogin').style.display = 'none';
                document.getElementById('contenutoRiservato').style.display = 'block';
                
                // Disegna il grafico!
                disegnaGrafico();
            } else {
                msg.innerText = "Credenziali errate. Riprova.";
                msg.className = "errore";
            }
        }

        // --- FUNZIONE PER IL GRAFICO A TORTA ---
        function disegnaGrafico() {
            fetch('/leggi')
            .then(response => response.text())
            .then(data => {
                const righe = data.trim().split('\n');
                let datiPerGrafico = [['Nome', 'Contributo']]; // Intestazione obbligatoria
                let ciSonoDati = false;

                if (data.trim()) {
                    righe.forEach(riga => {
                        if(riga.includes(':')) {
                            const parti = riga.split(':');
                            const nome = parti[0];
                            const importo = parseFloat(parti[1]);
                            
                            if(!isNaN(importo)) {
                                datiPerGrafico.push([nome, importo]);
                                ciSonoDati = true;
                            }
                        }
                    });
                }

                if (ciSonoDati) {
                    var dataTable = google.visualization.arrayToDataTable(datiPerGrafico);
                    var options = {
                        is3D: true, // Questo rende il grafico "di profilo"!
                        backgroundColor: 'transparent',
                        legend: { position: 'bottom', textStyle: { color: '#333', fontSize: 13 } },
                        chartArea: { width: '90%', height: '70%' }
                    };

                    var chart = new google.visualization.PieChart(document.getElementById('piechart_3d'));
                    chart.draw(dataTable, options);
                } else {
                    document.getElementById('piechart_3d').innerHTML = "<p style='padding-top: 100px; color: #95a5a6;'>Nessun versamento registrato.</p>";
                }
            })
            .catch(error => console.error('Errore lettura db per grafico:', error));
        }

        // --- FUNZIONI DELLA CASSA ---
        function salvaInDB() {
            let nomeGrezzo = document.getElementById('nomeInput').value.trim();
            const soldiRaw = document.getElementById('soldiInput').value.trim();
            const messaggioDiv = document.getElementById('messaggio');

            messaggioDiv.innerText = "";
            messaggioDiv.className = "";

            if (!nomeGrezzo) return mostraMessaggio("Errore: Inserisci un nome.", true);
            if (!isNaN(nomeGrezzo)) return mostraMessaggio("Errore: Il nome non può essere un numero.", true);
            if (!soldiRaw) return mostraMessaggio("Errore: Inserisci un importo.", true);

            let nome = nomeGrezzo.charAt(0).toUpperCase() + nomeGrezzo.slice(1).toLowerCase();
            let soldiNormalizzati = soldiRaw.replace(',', '.');
            
            if (isNaN(soldiNormalizzati) || soldiNormalizzati === "") {
                return mostraMessaggio("Errore: Importo non valido.", true);
            }

            let soldiFormattati = Number(soldiNormalizzati).toFixed(2);
            const testoDaSalvare = nome + ":" + soldiFormattati;

            fetch('/scrivi', {
                method: 'POST',
                body: testoDaSalvare
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('nomeInput').value = '';
                document.getElementById('soldiInput').value = '';
                calcolaStatistiche();
            })
            .catch(error => {
                mostraMessaggio("Errore di comunicazione col server.", true);
            });
        }

        function calcolaStatistiche() {
            fetch('/leggi')
            .then(response => response.text())
            .then(data => {
                const righe = data.trim().split('\n');
                let totale = 0;
                let persone = 0;
                let righeTabellaHtml = "";

                if (data.trim()) {
                    righe.forEach(riga => {
                        if(riga.includes(':')) {
                            const parti = riga.split(':');
                            const nome = parti[0];
                            const importo = parseFloat(parti[1]);
                            
                            if(!isNaN(importo)) {
                                totale += importo;
                                persone++;
                                righeTabellaHtml += `<tr><td>${nome}</td><td>${importo.toFixed(2)} €</td></tr>`;
                            }
                        }
                    });
                }

                if (persone === 0) {
                    righeTabellaHtml = "<tr><td colspan='2' style='text-align: center; color: #95a5a6;'>Nessun dato presente</td></tr>";
                }

                const media = persone > 0 ? (totale / persone) : 0;
                
                document.getElementById('tabellaCorpo').innerHTML = righeTabellaHtml;
                document.getElementById('valTotale').innerText = totale.toFixed(2) + " €";
                document.getElementById('valMedia').innerText = media.toFixed(2) + " €";
            })
            .catch(error => console.error('Errore lettura db:', error));
        }

        function mostraMessaggio(testo, isErrore) {
            const div = document.getElementById('messaggio');
            div.innerText = testo;
            div.className = isErrore ? "errore" : "successo";
        }
    </script>
</body>
</html>
